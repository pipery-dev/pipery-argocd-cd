# ============================================================================
# Bitbucket Pipelines Configuration for pipery-argocd-cd
# Production-Ready GitOps/ArgoCD Deployment Pipeline
# ============================================================================
#
# SETUP: Configure Protected Variables
# - ARGOCD_TOKEN: ArgoCD authentication token (Secured)
# - KUBECONFIG_BASE64: Kubernetes config (Secured, optional)
# - GITHUB_TOKEN: GitHub API token for Git operations (Secured)
#
# FEATURES:
# - Synchronize ArgoCD applications
# - Support multiple ArgoCD instances
# - Progressive deployment strategies
# - Health status monitoring

definitions:
  steps:
    - step: &checkout-step
        name: Checkout Repository
        image: alpine:latest
        script:
          # Refactored: Call shared script instead of inline logic
          - bash ./src/step-checkout.sh
        env:
          INPUT_LOG_FILE: ${LOG_FILE:-pipery.jsonl}

    - step: &setup-step
        name: Setup ArgoCD Environment
        image: alpine:latest
        script:
          # Refactored: Call shared script instead of inline logic
          - bash ./src/setup-psh.sh
        env:
          INPUT_LOG_FILE: ${LOG_FILE:-pipery.jsonl}

    - step: &download-step
        name: Validate Configuration
        image: alpine:latest
        script:
          # Refactored: Call shared script instead of inline logic
          - bash ./src/step-pull.sh
        env:
          INPUT_IMAGE_NAME: ${ARGOCD_IMAGE_NAME}
          INPUT_IMAGE_TAG: ${ARGOCD_IMAGE_TAG}
          INPUT_REGISTRY: ghcr.io
          INPUT_LOG_FILE: ${LOG_FILE:-pipery.jsonl}

    - step: &deploy-step-script
        name: Deploy via ArgoCD Sync
        image: alpine:latest
        script:
          # Refactored: Call shared script instead of inline logic
          - bash ./src/step-update.sh && bash ./src/step-sync.sh
        env:
          INPUT_ARGOCD_SERVER: ${ARGOCD_SERVER}
          INPUT_ARGOCD_APP: ${ARGOCD_APP_NAME}
          INPUT_ARGOCD_TOKEN: ${ARGOCD_TOKEN}
          INPUT_IMAGE_NAME: ${ARGOCD_IMAGE_NAME}
          INPUT_IMAGE_TAG: ${ARGOCD_IMAGE_TAG}
          INPUT_SYNC_TIMEOUT: ${SYNC_TIMEOUT:-5m}
          INPUT_PRUNE: "false"
          INPUT_FORCE: "false"
          INPUT_LOG_FILE: ${LOG_FILE:-pipery.jsonl}

    - step: &status-check-step
        name: Status Check & Health Verification
        image: alpine:latest
        script:
          # Refactored: Call shared script instead of inline logic
          - bash ./src/step-status.sh
        env:
          INPUT_ARGOCD_SERVER: ${ARGOCD_SERVER}
          INPUT_ARGOCD_APP: ${ARGOCD_APP_NAME}
          INPUT_ARGOCD_TOKEN: ${ARGOCD_TOKEN}
          INPUT_LOG_FILE: ${LOG_FILE:-pipery.jsonl}

    - step: &logs-step
        name: Collect & Archive Logs
        image: alpine:latest
        script:
          # Refactored: Call shared script instead of inline logic
          - bash ./src/main.sh
        env:
          INPUT_PROJECT_PATH: ${PROJECT_PATH:-.}
          INPUT_LOG_FILE: ${LOG_FILE:-pipery.jsonl}
        artifacts:
          - ${LOG_FILE:-pipery.jsonl}


    - step: &dashboard-link
        name: Pipery Dashboard Link
        image: alpine:latest
        optional: true
        max-time: 5
        script:
          - echo "=================================================="
          - echo "Pipery Dashboard Link Generator"
          - echo "=================================================="
          - echo ""
          - # Construct artifact URL using Bitbucket's build endpoint
          - ARTIFACT_URL="https://bitbucket.org/${BITBUCKET_REPO_FULL_NAME}/pipelines/${BITBUCKET_BUILD_NUMBER}"
          - ""
          - # URL encode using Python (if available) or fall back to direct URL
          - ENCODED_ARTIFACT=$(python3 -c "import sys, urllib.parse; print(urllib.parse.quote('${ARTIFACT_URL}'))" 2>/dev/null || echo "${ARTIFACT_URL}")
          - ""
          - # Create dashboard URL
          - DASHBOARD_URL="https://dash.pipery.dev/?artifact=${ENCODED_ARTIFACT}"
          - ""
          - echo "Build Information:"
          - echo "  Repository: $BITBUCKET_REPO_FULL_NAME"
          - echo "  Build: $BITBUCKET_BUILD_NUMBER"
          - echo "  Branch: $BITBUCKET_BRANCH"
          - echo "  Commit: $BITBUCKET_COMMIT"
          - echo ""
          - echo "Artifact URL:"
          - echo "  $ARTIFACT_URL"
          - echo ""
          - echo "Dashboard Link:"
          - echo "[View in Pipery Dashboard]($DASHBOARD_URL)"
          - echo ""
          - |
            cat > dashboard-link.txt << 'DASHBOARD_EOF'
            # Pipery Dashboard Link

            Repository: $BITBUCKET_REPO_FULL_NAME
            Build: $BITBUCKET_BUILD_NUMBER
            Branch: $BITBUCKET_BRANCH
            Commit: $BITBUCKET_COMMIT
            Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)

            ## Dashboard
            [View in Pipery Dashboard]($DASHBOARD_URL)

            ## Direct Links
            - Bitbucket Build: https://bitbucket.org/${BITBUCKET_REPO_FULL_NAME}/pipelines/${BITBUCKET_BUILD_NUMBER}
            DASHBOARD_EOF
          - echo "Dashboard link info saved to dashboard-link.txt"
          - echo "=================================================="
        artifacts:
          - dashboard-link.txt

variables:
  PROJECT_PATH: "."
  CONFIG_FILE: ".pipery/config.yaml"

  # ArgoCD Configuration
  ARGOCD_SERVER: ""                   # e.g., https://argocd.example.com
  ARGOCD_APP_NAME: ""                 # ArgoCD application name
  # ARGOCD_TOKEN: (Set as Protected Variable)

  # Git Configuration
  GIT_REPO_URL: ""                    # Optional: Git repository URL for app source
  GIT_REVISION: ""                    # Optional: Git revision/branch to sync

  # Image Configuration
  ARGOCD_IMAGE_NAME: ""               # Optional: image repository (e.g., ghcr.io/org/app)
  ARGOCD_IMAGE_TAG: ""                # Optional: image tag

  # Deployment Configuration
  DEPLOY_STRATEGY: "rolling"          # Options: rolling, blue-green, progressive
  ARGOCD_AUTO_SYNC: "true"            # Enable automatic application sync
  SYNC_TIMEOUT: "5m"

  # Feature Flags
  SKIP_DOWNLOAD: "false"
  SKIP_DEPLOY: "false"
  SKIP_STATUS_CHECK: "false"

  # Logging
  LOG_FILE: "pipery.jsonl"

pipelines:
  default:
    - step: *checkout-step
    - step: *setup-step
    - step: *download-step
    - step:
        <<: *deploy-step-script
        trigger: manual
    - step:
        <<: *status-check-step
        optional: true
    - step: *logs-step
    - step: *dashboard-link

  branches:
    main:
      - step: *checkout-step
      - step: *setup-step
      - step: *download-step
      - step:
          <<: *deploy-step-script
          trigger: manual
      - step:
          <<: *status-check-step
          optional: true
      - step: *logs-step
    - step: *dashboard-link

  pull-requests:
    feature/**:
      - step: *checkout-step
      - step: *setup-step
      - step:
          <<: *download-step
          optional: true
      - step: *logs-step
    - step: *dashboard-link

  custom:
    deploy:
      - step: *checkout-step
      - step: *setup-step
      - step: *download-step
      - step:
          <<: *deploy-step-script
          trigger: manual
      - step:
          <<: *status-check-step
          optional: true
      - step: *logs-step
