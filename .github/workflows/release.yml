name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    uses: pipery-dev/pipery-tooling/.github/workflows/pipery-release.yml@main
    with:
      bump: ${{ inputs.bump }}
    permissions:
      contents: write
