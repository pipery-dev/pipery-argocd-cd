owner = "pipery-dev"
action_name = "pipery-argocd-cd"
title = "Pipery ArgoCD CD"
description = "CD pipeline for ArgoCD: update image tag → sync application → wait for Argo rollout"
marketplace_category = "continuous-integration"
author = "pipery-dev"
action_type = "composite"
default_branch = "main"
version = "3.0.0"
repository_visibility = "public"
test_command = ""
test_project_path = "test-project"
test_project_input = "project_path"
test_log_path = "pipery.jsonl"
test_log_success_values = ["success", "succeeded", "passed", "ok"]
cleanup_paths = ["pipery.jsonl"]

[[inputs]]
name = "project_path"
description = "Path to the project source tree."
required = false
default = "."

[[inputs]]
name = "config_file"
description = "Path to the pipery config file."
required = false
default = ".github/pipery/config.yaml"

[[inputs]]
name = "argocd_server"
description = "ArgoCD server URL (e.g. argocd.example.com)."
required = false
default = ""

[[inputs]]
name = "argocd_app"
description = "ArgoCD application name."
required = false
default = ""

[[inputs]]
name = "argocd_token"
description = "ArgoCD authentication token."
required = false
default = ""

[[inputs]]
name = "image_name"
description = "Container image name to update in ArgoCD."
required = false
default = ""

[[inputs]]
name = "image_tag"
description = "Container image tag to deploy."
required = false
default = "${{ github.sha }}"

[[inputs]]
name = "sync_timeout"
description = "Seconds to wait for ArgoCD sync."
required = false
default = "300"

[[inputs]]
name = "prune"
description = "Prune resources during sync."
required = false
default = "false"

[[inputs]]
name = "force"
description = "Force sync even if app is in sync."
required = false
default = "false"

[[inputs]]
name = "skip_update"
description = "Skip image tag update step."
required = false
default = "false"

[[inputs]]
name = "skip_sync"
description = "Skip ArgoCD sync step."
required = false
default = "false"

[[inputs]]
name = "skip_status_check"
description = "Skip rollout status check."
required = false
default = "false"

[[inputs]]
name = "log_file"
description = "Path to write the JSONL log file."
required = false
default = "pipery.jsonl"

[[test_log_required_fields]]
name = "event"
value = "deploy"
