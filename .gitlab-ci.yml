# GitLab CI Pipeline for pipery-argocd-cd
# This is the GitLab CI equivalent of the GitHub Actions ArgoCD CD workflow
#
# SETUP INSTRUCTIONS:
# 1. Copy this file to your pipery-argocd-cd repository as .gitlab-ci.yml
# 2. Update the variables section with your ArgoCD configuration
# 3. Configure protected variables in GitLab CI/CD settings (Settings > CI/CD > Variables)
#    - ARGOCD_TOKEN (required)
# 4. Set any skip_* variables to 'true' if you want to disable specific steps
#
# VARIABLES:
# These correspond to the GitHub Action inputs. Customize as needed.

variables:
  PROJECT_PATH: "."
  CONFIG_FILE: ".pipery/config.yaml"
  # ArgoCD configuration
  ARGOCD_SERVER: ""
  ARGOCD_APP: ""
  IMAGE_NAME: ""
  IMAGE_TAG: "$CI_COMMIT_SHA"
  # Sync options
  SYNC_TIMEOUT: "300"
  PRUNE: "false"
  FORCE: "false"
  # Skip controls
  SKIP_UPDATE: "false"
  SKIP_SYNC: "false"
  SKIP_STATUS_CHECK: "false"
  # Secrets (set in GitLab Protected Variables)
  # ARGOCD_TOKEN: (set in GitLab Protected Variables)
  # Logging
  LOG_FILE: "pipery.jsonl"

stages:
  - checkout
  - setup
  - download
  - update
  - sync
  - status_check
  - logs

# ============================================================================
# CHECKOUT & SETUP STAGE
# ============================================================================

checkout:
  stage: checkout
  image: alpine:latest
  script:
    # Refactored: Call shared script instead of inline logic
    - bash ./src/step-checkout.sh
  env:
    INPUT_LOG_FILE: $LOG_FILE
  artifacts:
    paths:
      - .git/
    expire_in: 1 day

setup:
  stage: setup
  image: alpine:latest
  script:
    # Refactored: Call shared script instead of inline logic
    - bash ./src/setup-psh.sh
  env:
    INPUT_LOG_FILE: $LOG_FILE
  artifacts:
    paths:
      - .git/
    expire_in: 1 day

# ============================================================================
# DOWNLOAD STAGE
# ============================================================================

download_images:
  stage: download
  image: alpine:latest
  script:
    # Refactored: Call shared script instead of inline logic
    - bash ./src/step-pull.sh
  env:
    INPUT_IMAGE_NAME: $IMAGE_NAME
    INPUT_IMAGE_TAG: $IMAGE_TAG
    INPUT_REGISTRY: $REGISTRY
    INPUT_LOG_FILE: $LOG_FILE
  allow_failure: true
  rules:
    - when: on_success

# ============================================================================
# UPDATE STAGE - Update ArgoCD Application
# ============================================================================

update_argocd_image:
  stage: update
  image: alpine:latest
  script:
    # Refactored: Call shared script instead of inline logic
    - bash ./src/step-update.sh
  env:
    INPUT_ARGOCD_SERVER: $ARGOCD_SERVER
    INPUT_ARGOCD_APP: $ARGOCD_APP
    INPUT_ARGOCD_TOKEN: $ARGOCD_TOKEN
    INPUT_IMAGE_NAME: $IMAGE_NAME
    INPUT_IMAGE_TAG: $IMAGE_TAG
    INPUT_LOG_FILE: $LOG_FILE
  rules:
    - if: '$SKIP_UPDATE == "true"'
      when: never
    - when: on_success
  allow_failure: true

# ============================================================================
# SYNC STAGE - Trigger ArgoCD Sync
# ============================================================================

sync_argocd:
  stage: sync
  image: alpine:latest
  dependencies:
    - update_argocd_image
  script:
    # Refactored: Call shared script instead of inline logic
    - bash ./src/step-sync.sh
  env:
    INPUT_ARGOCD_SERVER: $ARGOCD_SERVER
    INPUT_ARGOCD_APP: $ARGOCD_APP
    INPUT_ARGOCD_TOKEN: $ARGOCD_TOKEN
    INPUT_SYNC_TIMEOUT: $SYNC_TIMEOUT
    INPUT_PRUNE: $PRUNE
    INPUT_FORCE: $FORCE
    INPUT_LOG_FILE: $LOG_FILE
  rules:
    - if: '$SKIP_SYNC == "true"'
      when: never
    - when: on_success
  artifacts:
    paths:
      - $LOG_FILE
    expire_in: 30 days
  allow_failure: true

# ============================================================================
# STATUS CHECK STAGE
# ============================================================================

status_check:
  stage: status_check
  image: alpine:latest
  dependencies:
    - sync_argocd
  script:
    # Refactored: Call shared script instead of inline logic
    - bash ./src/step-status.sh
  env:
    INPUT_ARGOCD_SERVER: $ARGOCD_SERVER
    INPUT_ARGOCD_APP: $ARGOCD_APP
    INPUT_ARGOCD_TOKEN: $ARGOCD_TOKEN
    INPUT_LOG_FILE: $LOG_FILE
  rules:
    - if: '$SKIP_STATUS_CHECK == "true"'
      when: never
    - when: on_success
  allow_failure: false

# ============================================================================
# ARTIFACTS & LOGGING
# ============================================================================

publish_logs:
  stage: logs
  image: alpine:latest
  script:
    # Refactored: Call shared script instead of inline logic
    - bash ./src/main.sh
  env:
    INPUT_PROJECT_PATH: $PROJECT_PATH
    INPUT_LOG_FILE: $LOG_FILE
  artifacts:
    paths:
      - $LOG_FILE
    expire_in: 90 days
  when: always
